<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn FH6 Garage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🏎️ Mijn FH6 Garage</h1>
        <p class="subtitle">Mijn persoonlijke auto-collectie in Forza Horizon 6</p>
    </header>

    <div class="grid">
        
        <div class="card">
            <img class="car-img" src="https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?w=500&auto=format&fit=crop&q=60" alt="Nissan GT-R">
            <div class="brand">Nissan</div>
            <div class="model">GT-R Nismo</div>
            <div class="stats">
                <span class="class">S2 991</span>
                <span class="year">2024</span>
            </div>
        </div>

        <div class="card">
            <img class="car-img" src="https://images.unsplash.com/photo-1617814076367-b759c7d7e738?w=500&auto=format&fit=crop&q=60" alt="Toyota Supra">
            <div class="brand">Toyota</div>
            <div class="model">GR Supra</div>
            <div class="stats">
                <span class="class">A 800</span>
                <span class="year">2020</span>
            </div>
        </div>

        <div class="card">
            <img class="car-img" src="https://images.unsplash.com/photo-1583121274602-3e2820c69888?w=500&auto=format&fit=crop&q=60" alt="Ferrari SF90">
            <div class="brand">Ferrari</div>
            <div class="model">SF90 Stradale</div>
            <div class="stats">
                <span class="class">S2 998</span>
                <span class="year">2021</span>
            </div>
        </div>

        </div>

</body>
</html>
