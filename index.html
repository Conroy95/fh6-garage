<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn FH6 Garage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🏎️ Mijn FH6 Garage</h1>
        <p class="subtitle">Mijn persoonlijke auto-collectie in Forza Horizon 6</p>
    </header>

    <div class="grid">
        
        <!-- Auto 1 -->
        <div class="card">
            <!-- Upload een foto met de naam 'nissan-gtr.jpg' naar GitHub -->
            <img class="car-img" src="nissan-gtr.jpg" alt="Nissan GT-R">
            <div class="brand">Nissan</div>
            <div class="model">GT-R Nismo</div>
            <div class="stats">
                <span class="class">S2 991</span>
                <span class="year">2024</span>
            </div>
        </div>

        <!-- Auto 2 -->
        <div class="card">
            <!-- Upload een foto met de naam 'supra.jpg' naar GitHub -->
            <img class="car-img" src="supra.jpg" alt="Toyota Supra">
            <div class="brand">Toyota</div>
            <div class="model">GR Supra</div>
            <div class="stats">
                <span class="class">A 800</span>
                <span class="year">2020</span>
            </div>
        </div>

        <!-- Auto 3 -->
        <div class="card">
            <!-- Upload een foto met de naam 'ferrari.jpg' naar GitHub -->
            <img class="car-img" src="ferrari.jpg" alt="Ferrari SF90">
            <div class="brand">Ferrari</div>
            <div class="model">SF90 Stradale</div>
            <div class="stats">
                <span class="class">S2 998</span>
                <span class="year">2021</span>
            </div>
        </div>

        <!-- Kopieer het blokje hieronder om zelf meer auto's toe te voegen -->
        <!-- 
        <div class="card">
            <img class="car-img" src="BESTANDSNAAM.jpg" alt="Auto Naam">
            <div class="brand">MERK</div>
            <div class="model">MODEL</div>
            <div class="stats">
                <span class="class">KLASSE</span>
                <span class="year">JAAR</span>
            </div>
        </div>
        -->

    </div>

</body>
</html>
