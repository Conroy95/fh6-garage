<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn FH6 Garage Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>🏎️ Mijn FH6 Garage</h1>
        <p class="subtitle">Mijn persoonlijke auto-collectie in Forza Horizon 6</p>
        
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Zoek op merk of model...">
        </div>
    </header>

    <main class="grid" id="garageGrid">
        
        <!-- Renault Megane R.S. -->
        <!-- Bij 'data-image' plak je de exacte URL van de foto van Fandom of de andere site -->
        <div class="card" data-brand="Renault" data-model="Megane R.S." data-image="https://static.wikia.nocookie.net/forzamotorsport/images/1/15/FH4_Renault_Megane_RS.png">
            <div class="card-image-wrapper">
                <img class="car-img" id="img-megane" src="" alt="Renault Megane R.S.">
            </div>
            <div class="card-content">
                <div class="brand">Renault</div>
                <div class="model">Megane R.S.</div>
                <div class="stats">
                    <span class="class">Hot Hatch</span>
                    <span class="year">2018</span>
                </div>
            </div>
        </div>

    </main>

    <script src="js/script.js"></script>
</body>
</html>
