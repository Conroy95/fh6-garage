<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn FH6 Garage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🏎️ Mijn FH6 Garage</h1>
        <p class="subtitle">Mijn persoonlijke auto-collectie in Forza Horizon 6</p>
    </header>

    <div class="grid">
        
        <!-- Jouw Renault Megane R.S. -->
        <div class="card">
            <!-- Dit zoekt exact naar jouw geüploade bestand -->
            <img class="car-img" src="Megane_RS.png" alt="Renault Megane R.S.">
            <div class="brand">Renault</div>
            <div class="model">Megane R.S.</div>
            <div class="stats">
                <span class="class">Hot Hatch</span>
                <span class="year">2018</span>
            </div>
        </div>

        <!-- Hieronder kun je later meer auto's toevoegen -->

    </div>

</body>
</html>
